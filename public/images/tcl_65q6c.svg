<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#0d0d14"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#04040A"/>
      <stop offset="40%" style="stop-color:#060818"/>
      <stop offset="100%" style="stop-color:#020208"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0520"/>
      <stop offset="60%" style="stop-color:#12073a"/>
      <stop offset="100%" style="stop-color:#1a0a50"/>
    </linearGradient>
    <linearGradient id="sunGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FF4500;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="standGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a3e"/>
      <stop offset="100%" style="stop-color:#0d0d18"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="screenClip">
      <rect x="52" y="28" width="696" height="415" rx="3"/>
    </clipPath>
  </defs>

  <!-- Stand base -->
  <rect x="335" y="465" width="130" height="10" rx="5" fill="url(#standGrad)" opacity="0.9"/>
  <rect x="355" y="448" width="90" height="20" rx="4" fill="url(#standGrad)"/>
  <polygon points="385,448 415,448 400,458" fill="#1a1a2e" opacity="0.5"/>

  <!-- TV outer bezel -->
  <rect x="30" y="10" width="740" height="455" rx="12" fill="url(#bodyGrad)" stroke="#252535" stroke-width="1.5"/>

  <!-- Screen background -->
  <rect x="52" y="28" width="696" height="415" rx="3" fill="url(#screenGrad)"/>

  <!-- Screen content: Vice City sunset scene -->
  <g clip-path="url(#screenClip)">
    <!-- Sky -->
    <rect x="52" y="28" width="696" height="415" fill="url(#skyGrad)"/>

    <!-- Sunset glow -->
    <ellipse cx="400" cy="260" rx="220" ry="140" fill="#FF4500" opacity="0.12"/>
    <ellipse cx="400" cy="290" rx="160" ry="90" fill="#FF6B35" opacity="0.08"/>

    <!-- Stars -->
    <circle cx="120" cy="55" r="1.2" fill="#fff" opacity="0.7"/>
    <circle cx="200" cy="45" r="0.9" fill="#fff" opacity="0.5"/>
    <circle cx="310" cy="60" r="1.4" fill="#FFD700" opacity="0.6"/>
    <circle cx="480" cy="42" r="1" fill="#fff" opacity="0.6"/>
    <circle cx="590" cy="55" r="1.2" fill="#fff" opacity="0.5"/>
    <circle cx="680" cy="48" r="0.9" fill="#FFD700" opacity="0.4"/>
    <circle cx="160" cy="80" r="0.8" fill="#00FFCC" opacity="0.4"/>
    <circle cx="540" cy="70" r="1" fill="#fff" opacity="0.4"/>
    <circle cx="720" cy="65" r="0.8" fill="#fff" opacity="0.5"/>

    <!-- Ocean horizon -->
    <rect x="52" y="300" width="696" height="143" fill="#03030d" opacity="0.9"/>

    <!-- Neon reflections in water -->
    <line x1="52" y1="315" x2="748" y2="315" stroke="#FF4500" stroke-width="0.8" opacity="0.15"/>
    <ellipse cx="400" cy="350" rx="180" ry="15" fill="#FF4500" opacity="0.05"/>
    <ellipse cx="400" cy="380" rx="120" ry="10" fill="#00FFCC" opacity="0.04"/>

    <!-- City skyline silhouette -->
    <!-- Buildings - left cluster -->
    <rect x="52" y="220" width="22" height="80" fill="#080816"/>
    <rect x="78" y="195" width="18" height="105" fill="#0a0a1c"/>
    <rect x="100" y="210" width="25" height="90" fill="#080816"/>
    <rect x="129" y="180" width="20" height="120" fill="#0a0a1c"/>
    <rect x="153" y="200" width="16" height="100" fill="#080816"/>
    <!-- Center buildings -->
    <rect x="240" y="165" width="28" height="135" fill="#0a0a1c"/>
    <rect x="272" y="145" width="22" height="155" fill="#080816"/>
    <rect x="298" y="170" width="30" height="130" fill="#0a0a1c"/>
    <!-- Center tall tower -->
    <rect x="362" y="115" width="26" height="185" fill="#0c0c1e"/>
    <rect x="390" y="95" width="18" height="205" fill="#0a0a1c"/>
    <rect x="410" y="125" width="22" height="175" fill="#080816"/>
    <!-- Right cluster -->
    <rect x="480" y="160" width="25" height="140" fill="#0a0a1c"/>
    <rect x="509" y="175" width="20" height="125" fill="#080816"/>
    <rect x="533" y="150" width="28" height="150" fill="#0a0a1c"/>
    <rect x="565" y="180" width="18" height="120" fill="#080816"/>
    <rect x="590" y="200" width="22" height="100" fill="#0a0a1c"/>
    <rect x="620" y="185" width="26" height="115" fill="#080816"/>
    <rect x="650" y="210" width="20" height="90" fill="#0a0a1c"/>
    <rect x="674" y="225" width="18" height="75" fill="#080816"/>
    <rect x="696" y="215" width="22" height="85" fill="#0a0a1c"/>
    <rect x="722" y="230" width="26" height="70" fill="#080816"/>

    <!-- Building windows - cyan neon -->
    <rect x="296" y="178" width="3" height="4" fill="#00FFCC" opacity="0.7"/>
    <rect x="303" y="185" width="3" height="4" fill="#00FFCC" opacity="0.5"/>
    <rect x="367" y="125" width="3" height="4" fill="#00FFCC" opacity="0.8"/>
    <rect x="374" y="132" width="3" height="4" fill="#FF4500" opacity="0.7"/>
    <rect x="393" y="108" width="3" height="4" fill="#00FFCC" opacity="0.9"/>
    <rect x="486" y="168" width="3" height="4" fill="#FF4500" opacity="0.6"/>
    <rect x="538" y="158" width="3" height="4" fill="#00FFCC" opacity="0.7"/>
    <rect x="622" y="192" width="3" height="4" fill="#FFD700" opacity="0.6"/>

    <!-- Palm tree silhouettes -->
    <line x1="200" y1="298" x2="200" y2="245" stroke="#050510" stroke-width="3"/>
    <ellipse cx="195" cy="248" rx="12" ry="6" fill="#050510" transform="rotate(-30 195 248)"/>
    <ellipse cx="205" cy="244" rx="14" ry="5" fill="#050510" transform="rotate(20 205 244)"/>
    <ellipse cx="198" cy="242" rx="10" ry="5" fill="#050510" transform="rotate(-10 198 242)"/>

    <line x1="600" y1="298" x2="598" y2="250" stroke="#050510" stroke-width="3"/>
    <ellipse cx="593" cy="253" rx="12" ry="5" fill="#050510" transform="rotate(-25 593 253)"/>
    <ellipse cx="603" cy="249" rx="13" ry="5" fill="#050510" transform="rotate(15 603 249)"/>

    <!-- Neon sign on building -->
    <text x="355" y="145" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#FF4500" opacity="0.9" filter="url(#glow)">VICE CITY</text>

    <!-- TCL QLED label overlay bottom left -->
    <rect x="60" y="398" width="55" height="18" rx="3" fill="#FFD700" opacity="0.15"/>
    <text x="87" y="411" font-family="Arial Black, sans-serif" font-size="8" font-weight="900" fill="#FFD700" text-anchor="middle">QLED</text>

    <rect x="120" y="398" width="52" height="18" rx="3" fill="#00FFCC" opacity="0.12"/>
    <text x="146" y="411" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#00FFCC" text-anchor="middle">144Hz</text>

    <rect x="177" y="398" width="34" height="18" rx="3" fill="#fff" opacity="0.08"/>
    <text x="194" y="411" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#fff" opacity="0.8" text-anchor="middle">4K</text>

    <!-- Ambient screen glow border -->
    <rect x="52" y="28" width="696" height="415" rx="3" fill="none" stroke="#00FFCC" stroke-width="0.5" opacity="0.12"/>
  </g>

  <!-- Thin bezel bottom bar -->
  <rect x="30" y="435" width="740" height="30" rx="0" fill="#151520" opacity="0.7"/>

  <!-- TCL brand center bottom -->
  <text x="400" y="457" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="#ffffff" opacity="0.5" text-anchor="middle" letter-spacing="3">TCL</text>
  <text x="400" y="468" font-family="Arial, sans-serif" font-size="7" fill="#00FFCC" opacity="0.4" text-anchor="middle" letter-spacing="2">65Q6C · QD-MINI LED</text>

  <!-- Screen ambient glow outside -->
  <rect x="30" y="10" width="740" height="455" rx="12" fill="none" stroke="#00FFCC" stroke-width="0.5" opacity="0.06"/>
</svg>
